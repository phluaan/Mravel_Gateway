server:
  port: 8080

spring:
  application:
    name: mravel-gateway

  cloud:
    gateway:
      httpclient:
        websocket:
          # Prevent protocol-error disconnects (1002) when forwarding large STOMP frames.
          max-frame-payload-length: 4194304
      routes:
        # AUTH SERVICE
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        # USER SERVICE
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/users/**

        # CATALOG SERVICE
        - id: catalog-service
          uri: http://catalog-service:8083
          predicates:
            - Path=/api/catalog/**

        # BOOKING SERVICE
        - id: booking-service
          uri: http://booking-service:8084
          predicates:
            - Path=/api/booking/**

        # PAYMENT (MoMo / VNPay redirect + IPN) -> booking-service
        - id: payment-service
          uri: http://booking-service:8084
          predicates:
            - Path=/api/payment/**

        # ADMIN SERVICE
        - id: admin-service
          uri: http://admin-service:8085
          predicates:
            - Path=/api/admin/**

        # PARTNER SERVICE
        - id: partner-service
          uri: http://partner-service:8087
          predicates:
            - Path=/api/partner/**

        # PLAN SERVICE
        - id: plan-service
          uri: http://plan-service:8086
          predicates:
            - Path=/api/plans/**
          filters:
            - RewritePath=/api/plans/(?<segment>.*), /api/plans/${segment}

        # NOTIFICATION SERVICE
        - id: notification-service
          uri: http://notification-service:8088
          predicates:
            - Path=/api/notifications/**

        # REVIEW SERVICE
        - id: review-service
          uri: http://review-service:8089
          predicates:
            - Path=/api/reviews/**

        # CHAT SERVICE
        - id: chat-service
          uri: http://chat-service:8091
          predicates:
            - Path=/api/chat/**

        # AI PLAN SERVICE
        - id: ai-plan-service
          uri: http://ai-plan-service:8092
          predicates:
            - Path=/api/ai-plan/**

        # REALTIME SERVICE — HTTP (presence)
        - id: realtime-http
          uri: http://realtime-service:8090
          predicates:
            - Path=/api/realtime/**

        # REALTIME / WEBSOCKET
        # Use http:// (not ws://) so the route also serves SockJS's plain HTTP
        # GET /ws/info; Spring Cloud Gateway auto-upgrades the actual WS handshake.
        - id: realtime-ws
          uri: http://realtime-service:8090
          predicates:
            - Path=/ws/**

      # CORS — same-origin in production (frontend nginx proxies /api & /ws),
      # so this is mostly defensive. Override WEB_ORIGIN for cross-origin testing.
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOrigins:
              - "${WEB_ORIGIN:http://localhost:5173}"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

# CORS origin(s) for the Java CorsWebFilter (comma-separated). Same value as WEB_ORIGIN.
gateway:
  cors:
    allowed-origins: ${WEB_ORIGIN:http://localhost:5173}

logging:
  level:
    org.springframework.cloud.gateway: INFO
