name: Build & Deploy Gateway

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gateway-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: own
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.own.outputs.owner }}/mravel-gateway:latest
            ghcr.io/${{ steps.own.outputs.owner }}/mravel-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NOTE: no SSH deploy here — the VPS pulls new images itself via a cron
      # running scripts/deploy.sh. CI only builds & pushes to GHCR.
