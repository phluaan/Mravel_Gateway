server:
  port: 8080

spring:
  application:
    name: mravel-gateway

  cloud:
    gateway:
      routes:
        # AUTH SERVICE
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        # USER SERVICE
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/users/**

        # CATALOG SERVICE
        - id: catalog-service
          uri: http://catalog-service:8083
          predicates:
            - Path=/api/catalog/**

        # BOOKING SERVICE (port 8084)
        - id: booking-service
          uri: http://booking-service:8084
          predicates:
            - Path=/api/booking/**

        # ADMIN SERVICE (port 8085)
        - id: admin-service
          uri: http://admin-service:8085
          predicates:
            - Path=/api/admin/**

        # PARTNER SERVICE (port 8087)
        - id: partner-service
          uri: http://partner-service:8087
          predicates:
            - Path=/api/partner/**

        # PLAN SERVICE
        - id: plan-service
          uri: http://plan-service:8086
          predicates:
            - Path=/api/plans/**
          filters:
            - RewritePath=/api/plans/(?<segment>.*), /api/plans/${segment}

        # NOTIFICATION SERVICE (port 8088)
        - id: notification-service
          uri: http://notification-service:8088
          predicates:
            - Path=/api/notifications/**

        # REALTIME / WEBSOCKET
        - id: realtime-ws
          uri: ws://realtime-service:8090
          predicates:
            - Path=/ws/**

      # CORS setup
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders: "*"
            allowCredentials: true

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
